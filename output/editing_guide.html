l is at Morgan Stanley in New York and back then, Morgan Stanley ran a different version of the 2+2 where you work for two years, get an MBA, and then come back.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=3gmTALERcNw", "start_time": "0:00", "end_time": "0:07", "description": "01. dominic wilde, hpe, visits #thecube. (00:20) 02. integrating hp networking with aruba. (00:39) 03. strategy of the aruba ...", "match_reasoning": "Video support: 01. dominic wilde, hpe, visits #thecube. (00:20) 02. integrating hp networking with aruba. (00:39) 03. strategy of the aruba ...", "relevance_score": 9, "with_audio": false, "video_title": "Dominic Wilde, HPE - HPE Discover 2015 London - #HPEDiscover - #theCUBE", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 12, "line_text": "Quattrone takes the deal, goes to Stanford for business school, and that Stanford-to-Silicon Valley pipeline defines the rest of his career.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=41S8Gd_u5KU", "start_time": "0:00", "end_time": "0:07", "description": "subscribe to the financial times on youtube: http://bit.ly/ftimesubs lex's oliver ralph and vincent boland analyse the financial ...", "match_reasoning": "Video support: subscribe to the financial times on youtube: http://bit.ly/ftimesubs lex's oliver ralph and vincent boland analyse the financial ...", "relevance_score": 9, "with_audio": false, "video_title": "HP/Autonomy: who knew?", "channel": "The Logan Bartlett Show", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 13, "line_text": "During one of his assignments as a Teaching Assistant at Stanford, Quattrone was sent to pick up an Apple II personal computer and load a financial software program onto it.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=foDmbiR2kH8", "start_time": "10:37", "end_time": "13:00", "description": "Frank on Stanford and Morgan Stanley", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": true, "video_title": "Interview Footage", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 14, "line_text": "[add b-roll from frank quattrone interview with harry stebbings around 3 min mark]\nA year later, a 25-year-old Steve Jobs walks into Jack McDonald's Stanford investment class.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=5m3tTA4JEqc", "start_time": "0:00", "end_time": "0:07", "video_title": "Daily Video: HP to Buy Aruba Networks for $3 Billion", "channel": "20VC with Harry Stebbings", "description": "hp to buy aruba networks for $3 billion; blackberry to offer its software for android, ios and windows devices; intel unveils ...", "match_reasoning": "Video support: hp to buy aruba networks for $3 billion; blackberry to offer its software for android, ios and windows devices; intel unveils ...", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 15, "line_text": "Quattrone is in the room and basically gets a glimpse into the future when Steve Jobs pitches the future of personal computing andQuattrone is hooked.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=5uj5GILfl_I", "start_time": "0:00", "end_time": "0:07", "description": "april 13 (bloomberg) -- randall smith, author of \"the prince of silicon valley: frank quattrone and the dot-com bubble,\" talks ...", "match_reasoning": "Video support: april 13 (bloomberg) -- randall smith, author of \"the prince of silicon valley: frank quattrone and the dot-com bubble,\" talks ...", "relevance_score": 9, "with_audio": true, "video_title": "Smith Says Quattrone Success Based on Talent, Not Luck", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 16, "line_text": "So much so that he bets his entire career on it.", "assets": [{"type": "image", "pic_number": 21, "description": "Silicon Valley - Silicon Valley aerial tech companies", "entity_name": "Silicon Valley", "match_reasoning": "Visually appropriate for line 21", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 17, "line_text": "[add b-roll from frank quattrone interview with harry stebbings around 5 min mark]\nAfter graduating from Stanford, in 1981 Quattrone returns to Morgan Stanley and practically begs to join its San Francisco office which his New York colleagues thought was career suicide given the SF office had just opened up and had literally zero revenue \nBut as we know now, Quattrone\u2019s move wasn\u2019t a foolish but a generational bet as he wouldn\u2019t just predict Silicon's Valley\u2019s rise - he would help cause it\nIn some sense though, Quattrone was 9 years too early because his first notable deal came when he took Cisco public in 1990 and then Intuit in 1993\nBut the world would change forever in 1995 when Quattrone led Netscape\u2019s IPO, which was originally set to be offered at $14 per share and opened at $71, becoming a $2.9 billion company with zero profits and kicking off the dot.com bubble that would burst 5 years later.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=8LYBjpmjB4k", "start_time": "0:00", "end_time": "0:07", "video_title": "HP Chairman Faces Fury Over Autonomy Acquisition", "channel": "20VC with Harry Stebbings", "description": "march 20 (bloomberg) -- hewlett-packard investors will get the chance to voice dismay over the $8.8 billion writedown of ...", "match_reasoning": "Video support: march 20 (bloomberg) -- hewlett-packard investors will get the chance to voice dismay over the $8.8 billion writedown of ...", "relevance_score": 9, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 18, "line_text": "The Internet had arrived, and Quattrone was the one who rang the bell \nBy 1996, Quattrone had built Morgan Stanley\u2019s tech group from nothing to its largest industry group at the firm even advising on Apple\u2019s iconic acquisition of NeXT which brought Steve Jobs back to Apple.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=8uklaIRJYYM", "start_time": "0:00", "end_time": "0:07", "description": "james robertson, vp & gm, kicked off the session by outlining hpe aruba networking's focus on two significant industry shifts: ai ...", "match_reasoning": "Video support: james robertson, vp & gm, kicked off the session by outlining hpe aruba networking's focus on two significant industry shifts: ai ...", "relevance_score": 9, "with_audio": true, "video_title": "HPE Aruba Networking Executive Overview with James Robertson", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 19, "line_text": "But Quattrone felt he wasn\u2019t being compensated fairly despite making $1 million more than Morgan Stanley\u2019s chairman and so lured by a 3 year $20 million deal plus incentives, Quattrone decided to take his talents to Deutsche Bank, creating a mass exodus of bankers - a trend that you\u2019ll see happen continuously - and took Amazon public in 1997 but the joyous marriage doesn\u2019t last long\nWhile Deutsche Bank pulled back its Sillicon Valley ambitions, Credit Suisse First Boston gave Quattrone an offer he couldn\u2019t refuse: a shot at building his own kingdom.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=foDmbiR2kH8", "start_time": "13:00", "end_time": "16:00", "description": "Frank on IPO boom", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "Interview Footage", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 20, "line_text": "So in 1998, Quattrone joins CSFB, bringing along with him over 150 bankers and support staff, gutting Deutsche Bank\u2019s entire tech practice so fast that Deutsche Bank simply sold its building to CSFB so Quattrone and his team didn\u2019t even need to move offices\nFrom 1998 to 2000, Quattrone almost single-handedly helps boost CSFB\u2019s underwriting rank in IPOs from 8 in 1998 to number 1 in 2000 and tripling fees from $203 million to $686 million, and CSFB leads more tech IPOs than Goldman or Morgan Stanley combined.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=AeKnw4awmQY", "start_time": "17:00", "end_time": "17:07", "video_title": "Negotiating Advice From the Man Behind Tech's BIGGEST Acquisitions (LinkedIn, Slack, Figma)", "channel": "20VC with Harry Stebbings", "description": "George on why pure sell-side is better", "match_reasoning": "Video support: George on why pure sell-side is better", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 21, "line_text": "Among them is the most insane IPO in history - the VA Linux IPO, which jumped from $30 to over $200 within minutes, a 700% increase.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=AeKnw4awmQY", "start_time": "8:00", "end_time": "8:07", "description": "Discussing the $26B LinkedIn acquisition", "match_reasoning": "Video support: Discussing the $26B LinkedIn acquisition", "relevance_score": 9, "with_audio": false, "video_title": "Negotiating Advice From the Man Behind Tech's BIGGEST Acquisitions (LinkedIn, Slack, Figma)", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 22, "line_text": "In the year 2000, Quattrone earns $120 million in a single year and he reportedly threw some crazy all-night parties and is crowned the Prince of Sillicon Valley, a gatekeeper to the world\u2019s top tech IPOs and riding this high is exactly what gets him into trouble when the dot-com bubble bursts", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=At1hnVKMoMs", "start_time": "0:00", "end_time": "0:07", "video_title": "News Update: 3PAR Accepted Dell&#39;s Upped Offer Of $24.30 Per Share August 26, 2010", "channel": "20VC with Harry Stebbings", "description": "dell (nasdaq:dell) announced that 3par (nyse:par) has accepted its increased offer to acquire the company for $24.30 per ...", "match_reasoning": "Video support: dell (nasdaq:dell) announced that 3par (nyse:par) has accepted its increased offer to acquire the company for $24.30 per ...", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 23, "line_text": "Transition: SECTION 2: From Tech Royalty to Prison Time\nSuddenly, the same practices that made Quattrone rich are under attack in the press, causing him to go from his absolute peak to a prison sentence\nAfter the dot com bubble bursts, companies go from billions to near zero, and everyone is trying to look for someone to blame and who better than the prince of Silicon Valley\nIt\u2019s a well known secret that Quattrone had been handing out hot tech IPO share allocations that were guaranteed to make money on day one to key executives who could help sway their company\u2019s decision to use CSFB as their investment bank and this group was known as \u201cFriends of Frank\u201d\nInterestingly, Quattrone is never charged for that shady conduct, and CSFB pays $100 million in a settlement with the SEC for profit-sharing arrangements, so here\u2019s what leads to his ultimate arrest.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=foDmbiR2kH8", "start_time": "41:17", "end_time": "41:24", "video_title": "Frank Quattrone: Lessons from 650 M&A Deals Worth Over $1TRN & Taking Amazon and Cisco Public| E1121", "channel": "20VC with Harry Stebbings", "description": "Tactics for understanding and leveraging buyer position", "match_reasoning": "Visual support for line 23", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 24, "line_text": "On December 3, 2000, CSFB's general counsel David Brodsky emails Quattrone about ongoing SEC and grand jury investigations into the firm's IPO allocation process and tells him not to tell anyone.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=B4ExBL3KMic", "start_time": "0:00", "end_time": "0:07", "description": "Autonomy founder demands details on HP&#39;s fraud allegations", "match_reasoning": "Video support: Autonomy founder demands details on HP&#39;s fraud allegations", "relevance_score": 9, "with_audio": false, "video_title": "Autonomy founder demands details on HP&#39;s fraud allegations", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 25, "line_text": "The next day, Richard Char, one of Quattrone's colleagues, sends an email suggesting the tech group do some year-end \u201cfile cleaning\u201d \u2014 standard housekeeping under CSFB's document retention policy.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=foDmbiR2kH8", "start_time": "37:47", "end_time": "41:00", "description": "Frank on Qatalyst methodology", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "Interview Footage", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 26, "line_text": "Quattrone replies: \"You shouldn't make jokes like that on email!\"\nThe next day on December 5th, Quattrone sends his own email to the group, writing: \"Having been a key witness in a securities litigation case in south texas,I strongly advise you to follow these procedures.\" and these 22 words becomes the basis for his prosecution.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=BpZes7y9Hbk", "start_time": "0:00", "end_time": "0:07", "video_title": "HP takes $8.8 billion charge from Autonomy accounting", "channel": "Knowledge at Wharton", "description": "HP takes $8.8 billion charge from Autonomy accounting", "match_reasoning": "Video support: HP takes $8.8 billion charge from Autonomy accounting", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "conference"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 27, "line_text": "The prosecution argues that Quattrone knew about the grand jury subpoena and forwarded a memo encouraging documentation destruction, and therefore corruptly obstructing justice\nIn February 2003, Quattrone is suspendedfrom CSFB but he doesn\u2019t seem too bothered by it seeing as he plays golf with Bill Murray and Kevin Costner days later\nBut in April 2003, Quattrone is arrested by the FBI with charges brought by US Attorney Jim Comey - the same one who became the FBI director.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=DcpUNttpwr0", "start_time": "0:00", "end_time": "0:07", "video_title": "Qatalyst shopped Looker to Microsoft, Amazon before Google deal", "channel": "20VC with Harry Stebbings", "description": "thank you, everyone, for watching my videos and sharing them with friends \u2764\ufe0f. please follow our twitter ...", "match_reasoning": "Video support: thank you, everyone, for watching my videos and sharing them with friends \u2764\ufe0f. please follow our twitter ...", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 28, "line_text": "In October 2003, the first trial ends in a hung jury that\u2019s deadlocked after 5 days of deliberation, in May 2004 he\u2019s convicted on 3 counts, and in September 2004, he\u2019s sentenced to 18 months in prison in part for also lying on the witness stand and also given a lifetime ban by the NASD from the securities industry\nQuattrone appeals the sentence and long-story short after many years of legal battles, all chargse are dropped in 2007, CSFB is ordered to pay him up to $550 million in overdue compensation, and the most powerful tech banker in the world is finally allowed to start working again but the empire he had built is gone\nMost people who fall this far don't come back, but here\u2019s the thing about Quattrone: his superpower was never just deal execution.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=DtYLffXBX8o", "start_time": "0:00", "end_time": "0:07", "video_title": "How to negotiate business deals", "channel": "Knowledge at Wharton", "description": "george boutros, ceo of qatalyst partners, shares his advice on negotiating business deals. #theloganbartlettshow #founders #vc ...", "match_reasoning": "Video support: george boutros, ceo of qatalyst partners, shares his advice on negotiating business deals. #theloganbartlettshow #founders #vc ...", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "conference"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 29, "line_text": "It was making people feel like the most important person in the room, and in cinematic timing, Quattrone moves from one market crash to the next by launching Qatalyst in 2008 during the Great Recession and within days, gets a phone call from Google .", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=F0DRUIBdUOk", "start_time": "0:00", "end_time": "0:07", "video_title": "HP Reports Revised Proposal to Buy 3Par for $27 a Share: Video", "channel": "20VC with Harry Stebbings", "description": "aug. 26 (bloomberg) -- hewlett-packard co. said it has increased its proposal to acquire all of the outstanding shares of 3par inc.", "match_reasoning": "Video support: aug. 26 (bloomberg) -- hewlett-packard co. said it has increased its proposal to acquire all of the outstanding shares of 3par inc.", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 30, "line_text": "SECTION 3: The Improbable Comeback\nThe timing looks insane in hindsight.", "assets": [{"type": "image", "pic_number": 78, "description": "Backup for broll line 31: Bear Stearns Lehman 2008 crisis", "entity_name": "Bear Stearns Lehman 2008 crisis", "match_reasoning": "Visually appropriate for line 78", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 31, "line_text": "Bear Stearns has just been sold to JPMorgan for $2 a share \u2014 down from $150 a year earlier.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=npa-8GIfo8Q", "start_time": "0:00", "end_time": "0:07", "description": "cisco buys tech startup appdynamics one day before its ipo. here's what to expect next. \u00bb subscribe to cnbc: ...", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "Cisco Buys AppDynamics One Day Before Its IPO | Tech Bet | CNBC", "channel": "CNBC", "era_appropriate": true, "source_type": "interview", "transcript_excerpt": "cisco buys tech startup appdynamics one day before its ipo. here's what to expect next. \u00bb subscribe "}], "has_gap": false, "custom_visual_description": null}, {"line_number": 32, "line_text": "Lehman falls six months later.", "assets": [{"type": "image", "pic_number": 79, "description": "Backup for broll line 31: Bear Stearns Lehman 2008 crisis", "entity_name": "Bear Stearns Lehman 2008 crisis", "match_reasoning": "Visually appropriate for line 79", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 33, "line_text": "M&A freezes globally and the entire banking industry is in shambles.", "assets": [{"type": "image", "pic_number": 80, "description": "Backup for broll line 31: Bear Stearns Lehman 2008 crisis", "entity_name": "Bear Stearns Lehman 2008 crisis", "match_reasoning": "Visually appropriate for line 80", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 34, "line_text": "But Quattrone's rolodex is fully intact.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=AeKnw4awmQY", "start_time": "0:00", "end_time": "0:07", "video_title": "Negotiating Advice From the Man Behind Tech's BIGGEST Acquisitions (LinkedIn, Slack, Figma)", "channel": "The Logan Bartlett Show", "description": "Introduction to George Boutros as dealmaker", "match_reasoning": "Visual support for line 34", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 35, "line_text": "Within days of the founding press release going out, Google reaches out.", "assets": [{"type": "image", "pic_number": 81, "description": "Backup for broll line 37: Google headquarters Googleplex", "entity_name": "Google headquarters Googleplex", "match_reasoning": "Visually appropriate for line 81", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 36, "line_text": "They need someone to help them create an alternative to Microsoft's $45 billion hostile takeover bid for Yahoo.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=FAK45zXJA1A", "start_time": "0:00", "end_time": "0:07", "video_title": "HP Autonomy News", "channel": "The Logan Bartlett Show", "description": "hp autonomy news.", "match_reasoning": "Video support: hp autonomy news.", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 37, "line_text": "The firm hasn't even closed its first deal yet and Google is on the phone.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=foDmbiR2kH8", "start_time": "46:56", "end_time": "48:39", "description": "Frank on strategic thinking", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "Interview Footage", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 38, "line_text": "That first year, Quattrone doesn't even know if they can make payroll but manages to pull off his first deal and earn fees on December 25th, 2008.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=AeKnw4awmQY", "start_time": "20:00", "end_time": "20:07", "video_title": "Negotiating Advice From the Man Behind Tech's BIGGEST Acquisitions (LinkedIn, Slack, Figma)", "channel": "The Logan Bartlett Show", "description": "Core philosophy of Qatalyst approach", "match_reasoning": "Visual support for line 38", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 39, "line_text": "Literally Christmas Day.", "assets": [{"type": "image", "pic_number": 5, "description": "Qatalyst Partners - Qatalyst Partners logo", "entity_name": "Qatalyst Partners", "match_reasoning": "Qatalyst first deal - logo contextually appropriate", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 40, "line_text": "But their first true breakout deal is Data Domain's sale to EMC in 2009.", "assets": [{"type": "image", "pic_number": 31, "description": "Backup for broll line 1: tech M&A deals", "entity_name": "tech M&A deals", "match_reasoning": "Visually appropriate for line 31", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 41, "line_text": "Qatalyst runs the process, engineers a bidding war and nearly doubles the purchase price from an original $1.5 billion offer from NetApp to $2.4 billion by the end of it\nThat's followed by 3PAR.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=GyYohLwmSE4", "start_time": "0:00", "end_time": "0:07", "video_title": "Cisco Systems acquires AppDynamics Inc. for $3.7 billion", "channel": "20VC with Harry Stebbings", "description": "cisco systems inc. agreed to acquire appdynamics inc. for $3.7 billion, buying out the software maker before it goes public. cisco ...", "match_reasoning": "Video support: cisco systems inc. agreed to acquire appdynamics inc. for $3.7 billion, buying out the software maker before it goes public. cisco ...", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 42, "line_text": "In 2010, Dell makes an initial bid of $1.15 billion and Qatalyst runs another competitive process, driving the ultimate acquisition price to $2.4 billion with the winning bid from HP.", "assets": [{"type": "image", "pic_number": 5, "description": "Qatalyst Partners - Qatalyst Partners logo", "entity_name": "Qatalyst Partners", "match_reasoning": "Qatalyst Partners visual for: 'In 2010, Dell makes an initial bid of $1.15 billio...'"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 43, "line_text": "And here's where there\u2019s some tea with HP.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=AeKnw4awmQY", "start_time": "2:00", "end_time": "5:00", "description": "George on negotiation tactics", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "Interview Footage", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 44, "line_text": "Later in October 2011, Qatalyst runs a process for Autonomy which is sold to HP for $10.3 billion which after a CEO transition is inherited by Meg Whitman.", "assets": [{"type": "image", "pic_number": 5, "description": "Qatalyst Partners - Qatalyst Partners logo", "entity_name": "Qatalyst Partners", "match_reasoning": "Qatalyst Partners visual for: 'Later in October 2011, Qatalyst runs a process for...'"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 45, "line_text": "Barely a year after the deal, HP announces an $8.8 billion writedown of the Autonomy deal due to accounting fraud and Whitman publicly turns on Qatalyst, saying the firm was \"guilty\" of playing too aggressively.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=HaQu_XcHYnI", "start_time": "0:00", "end_time": "0:07", "video_title": "HPE Aruba Networking Central Essentials Webinar", "channel": "Knowledge at Wharton", "description": "explore the powerful new capabilities of hpe aruba networking central in this technical session. learn how to reduce mttr and ...", "match_reasoning": "Video support: explore the powerful new capabilities of hpe aruba networking central in this technical session. learn how to reduce mttr and ...", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "conference"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 46, "line_text": "She hates Qatalyst so much that when the bank was running a sale process for Aruba Networks, Whitman could only negotiate by bringing in a buffer person to sit between Whitman and Qatalyst so the two sides never had to directly face each other.", "assets": [{"type": "image", "pic_number": 5, "description": "Qatalyst Partners - Qatalyst Partners logo", "entity_name": "Qatalyst Partners", "match_reasoning": "Qatalyst Partners visual for: 'She hates Qatalyst so much that when the bank was ...'"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 47, "line_text": "The deal amazingly still closed at $2.7BN with HP as the buyer even with Whitman believing George Boutros to be \u201cevil.\u201d \nAnd so this is a great time for us to talk about the 2nd most important person in Qatalyst\u2019s history - George Boutros\nBoutros joined Qatalyst in 2010, coming from Credit Suisse, where he led the sales of YouTube to Google and Pixar to Disney.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=M0QcqrWSrTc", "start_time": "2:30", "end_time": "2:37", "video_title": "Frank Quattrone: Business Exits in the Current Economic Environment", "channel": "20VC with Harry Stebbings", "description": "Analysis of M&A market conditions and strategy", "match_reasoning": "Video support: Analysis of M&A market conditions and strategy", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 48, "line_text": "Quattrone and Boutros are a powerful duo that is known for their good cop, bad cop personas.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=MauVJbDbr6w", "start_time": "0:00", "end_time": "0:07", "video_title": "Headache for HP Over Autonomy Acquisition", "channel": "The Logan Bartlett Show", "description": "for alk classes.", "match_reasoning": "Video support: for alk classes.", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 49, "line_text": "Quattrone\u2019s reputation is all about relationships \u2014 warm, client-facing, and making you feel heard.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=AeKnw4awmQY", "start_time": "5:00", "end_time": "8:00", "description": "George on deal value", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "Interview Footage", "channel": "20VC with Harry Stebbings", "era_appropriate": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 50, "line_text": "Boutro\u2019s reputation is notorious for being brash, aggressive, and execution-focused.", "assets": [{"type": "image", "pic_number": 7, "description": "George Boutros - George Boutros Qatalyst banker", "entity_name": "George Boutros", "match_reasoning": "Visually appropriate for line 7", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 51, "line_text": "Quattrone is the optimist.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=M0QcqrWSrTc", "start_time": "0:00", "end_time": "0:07", "video_title": "Frank Quattrone: Business Exits in the Current Economic Environment", "channel": "Knowledge at Wharton", "description": "Frank on stage at his alma mater Wharton campus", "match_reasoning": "Strategic placement: Frank on stage at his alma mater Wharton campus", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "conference"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 52, "line_text": "Boutros is the pessimist.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=AeKnw4awmQY", "start_time": "23:00", "end_time": "23:07", "video_title": "Negotiating Advice From the Man Behind Tech's BIGGEST Acquisitions (LinkedIn, Slack, Figma)", "channel": "The Logan Bartlett Show", "description": "Why Qatalyst wins deals against Goldman and Morgan Stanley", "match_reasoning": "Visual support for line 52", "relevance_score": 8, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 53, "line_text": "On client calls, Quattrone tells you to shoot for the moon.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=W41qmGMPCFU", "start_time": "0:00", "end_time": "0:07", "video_title": "Meeks Says HP, Dell Paying `Whopping Price&#39; for 3Par: Video", "channel": "Knowledge at Wharton", "description": "aug. 30 (bloomberg) -- paul meeks, an equity analyst at capstone investments inc., talks about the bidding war between hewlett ...", "match_reasoning": "Video support: aug. 30 (bloomberg) -- paul meeks, an equity analyst at capstone investments inc., talks about the bidding war between hewlett ...", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "conference"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 54, "line_text": "Boutros brings you back with risk-adjusted reality.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=WUBwsEiA5g0", "start_time": "0:00", "end_time": "0:07", "video_title": "Bitesized Insight from Mike Lynch of Autonomy and Invoke", "channel": "The Logan Bartlett Show", "description": "bitesized insight of mike lynch, founder of autonomy and invoke subscribe to founders forum for much more: ...", "match_reasoning": "Video support: bitesized insight of mike lynch, founder of autonomy and invoke subscribe to founders forum for much more: ...", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 55, "line_text": "Clients get both shoulders of the advice and that polarizing dynamic sets the foundation for Qatalyst\u2019s dominance in the years that followed.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=c7-0bCrG7ys", "start_time": "0:00", "end_time": "0:07", "description": "nov. 18 (bloomberg) -- frank quattrone, chief executive officer of qatalyst partners and one of the top investment bankers to ...", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "Quattrone Sees `Exciting&#39; Growth Segments in Technology", "channel": "Bloomberg Originals", "era_appropriate": true, "source_type": "interview", "transcript_excerpt": "nov. 18 (bloomberg) -- frank quattrone, chief executive officer of qatalyst partners and one of the "}], "has_gap": false, "custom_visual_description": null}, {"line_number": 56, "line_text": "i After just one year of Boutros joining, things really start to fly in 2011.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=pO6I7KWRLhw", "start_time": "0:00", "end_time": "0:07", "video_title": "Autonomy Founder Lynch Sues HP for $160 Million", "channel": "Bloomberg Originals", "description": "oct. 1 -- today's \"bwest byte\" is $160 million, for the amount autonomy founder mike lynch is seeking from hewlett-packard in a ...", "match_reasoning": "Visual support for line 56", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview", "transcript_excerpt": "oct. 1 -- today's \"bwest byte\" is $160 million, for the amount autonomy founder mike lynch is seekin"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 57, "line_text": "Motorola to Google - $12.5 billion.", "assets": [{"type": "image", "pic_number": 16, "description": "Dot-com bubble - dot com bubble stock chart crash", "entity_name": "Dot-com bubble", "match_reasoning": "Visually appropriate for line 16", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 58, "line_text": "Autonomy to HP - $10.3 billion.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=ZsmxapwffPE", "start_time": "0:00", "end_time": "0:07", "video_title": "HP Claims Fraud at Autonomy", "channel": "The Logan Bartlett Show", "description": "HP Claims Fraud at Autonomy", "match_reasoning": "Video support: HP Claims Fraud at Autonomy", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 59, "line_text": "National Semiconductor to TI - $6.5BN.", "assets": [{"type": "image", "pic_number": 20, "description": "Credit Suisse First Boston - Credit Suisse First Boston CSFB", "entity_name": "Credit Suisse First Boston", "match_reasoning": "Visually appropriate for line 20", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 60, "line_text": "Riot Games to Tencent and so many more all in a single year with a team of only 20 bankers so you know those bonuses were fat and at this point the question isn\u2019t if Qatalyst can compete with Goldman and Morgan Stanley - it\u2019s whether the big banks can compete with Qatalyst\nBy this point, Quattrone is hailed as an all-time rainmaker and takes Qatalyst to new heights by advising Dell\u2019s $24.4 billion take-private transaction and in 2015, Qatalyst advises on 12 deals worth $33.5 billion, capturing 7% of total tech deal volume with only an 80 person firm\nThen suddenly in 2016 like Michael Jordan\u2019s retirement at the peak of his powers, Quattrone steps down as CEO and hands over day to day operations to Boutros, which is an important step in establishing Qatalyst as an institution with a succession structure, not just a personality cult around one man and this is when Qatalyst goes on a tear making it the most feared tech bank bully on Wall Street", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=sPTG7NJDfwQ", "start_time": "0:00", "end_time": "0:07", "video_title": "Anthem cover by George Boutros", "channel": "George Boutros", "description": "\"anthem\" a song by leonard cohen cover by george boutros the message of hope in darkness\u270c\ufe0f thanks to wolfgangt for the ...", "match_reasoning": "Visual support for line 60", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview", "transcript_excerpt": "\"anthem\" a song by leonard cohen cover by george boutros the message of hope in darkness\u270c\ufe0f thanks to"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 61, "line_text": "SECTION 4: From Underdog to Bully\nWith Quattrone still deeply involved in deals, Qatalyst goes on a tear and for those of you who are deal junkies, you\u2019re going to love the 3 deals I\u2019m about to detail that showcase why Qatalyst went from being a dominant boutique to a nightmare to its competitors\nFirst is LinkedIn\u2019s $26 billion sale to Microsoft in 2016 which resulted in one major bank disseminating a 10 page presentation to counteract Qatalyst, who was deemed Sillicon Valley\u2019s Favorite Bully\nBut besides this being Qatalyst\u2019s largest deal at the time, what makes this deal so fascinating is the baked in revenge story\nIn April 2016 just months before the LinkedIn deal would be announced, Quattrone tweeted about Credit Suisse throwing a top performer under the bus making it clear he still felt he was treated unfairly by the bank\nThe greater context behind this is that Credit Suisse used to be Sillicon Valley\u2019s bank in the 2000s but Quattrone had lured away Boutros who brought all his relationships with him as Credit Suisse\u2019s Chairman of Tech banking\nThe LinkedIn deal was the defining deal of the era that showcased that Quattrone rebuilt the exact tech banking franchise that Credit Suisse took away from him and his tweet was just the cherry on top\nThe second deal is AppDynamics, which was supposed to be the first big tech IPO of 2017 with Goldman, Morgan Stanley, and JP Morgan as the top 3 underwriters\nThe IPO roadshow was going well but at the same time, the company had tapped Qatalyst to simultaneously run a sale and deliberately chose them to avoid info about the deal leaking to the press\nIn just 72 hours, Qatalyst sold the company to Cisco for $3.7 billion - 20% higher than the expected post IPO price and Qatalyst brilliantly used the pressure of the IPO as leverage for negotiations\nThis meant AppDynamics\u2019 CEO was pitching the stock to investors hours before the acquisition\u2019s announcement, which sent shock waves throughout the industry\nSenior bankers pride themselves and win business by having deep relationships with their clients and during IPO roadshows are literally in rooms and planes with the CEO and CFO every day, so I\u2019m sure the bankers leading the IPO were pissed because it means pennies for all their hard work while Qatalyst swooped in and collection tens of millions in fees\nQatalyst was becoming every top tech firm\u2019s preferred tech advisor and by 2019, Morgan Stanley and other top banks began pitching M&A IPO dual mandates during IPO conversations so Qatalyst couldn\u2019t slide in and take away another deal, which is incredible since the biggest bank in tech is building its pitch around a 90 person boutique bank\nThe last deal is Qualtrics\u2019 sale to SAP, which is a masterclass in dealmaking.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=eCAokQTZkWQ", "start_time": "0:00", "end_time": "0:07", "description": "http://www.euronews.com/ the uk's anti-fraud agency has confirmed it is investigating british software firm autonomy, which has ...", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "Autonomy &#39;fraud&#39; probe expands", "channel": "euronews", "era_appropriate": true, "source_type": "interview", "transcript_excerpt": "http://www.euronews.com/ the uk's anti-fraud agency has confirmed it is investigating british softwa"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 62, "line_text": "Quattrone invites both Ryan Smith \u2014 the CEO of Qualtrics \u2014 and Bill McDermott \u2014 the CEO of SAP \u2014 to speak back to back at Qatalyst\u2019s annual Pebble Beach retreat so they could essentially inspire one another.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=M0QcqrWSrTc", "start_time": "5:00", "end_time": "5:07", "video_title": "Frank Quattrone: Business Exits in the Current Economic Environment", "channel": "Knowledge at Wharton", "description": "Discussion of business exit strategy and value creation", "match_reasoning": "Visual support for line 62", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "conference"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 63, "line_text": "The two men disappear to a coffee shop mid-retreat and Quattrone joins them later and instructs that each of them give each other three reasons of why a merger would work.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=foDmbiR2kH8", "start_time": "50:21", "end_time": "50:28", "video_title": "Frank Quattrone: Lessons from 650 M&A Deals Worth Over $1TRN & Taking Amazon and Cisco Public| E1121", "channel": "20VC with Harry Stebbings", "description": "Rapid-fire insights into deal-making philosophy", "match_reasoning": "Strategic placement: Rapid-fire insights into deal-making philosophy", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 64, "line_text": "He steps away for an hour and comes back to a cocktail napkin with the deal terms sketched out and just like that an $8 billion deal is live.", "assets": [{"type": "image", "pic_number": 87, "description": "Backup for broll line 49: boardroom client meeting", "entity_name": "boardroom client meeting", "match_reasoning": "Visually appropriate for line 87", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 65, "line_text": "What makes this deal crazy is that Goldman and Morgan Stanley were lead banks for Qualtrics\u2019 IPO meaning they had deep relationships with the company but had absolutely zero idea about the sale and learned about it on the news like everyone else\nThese transactions turn Qatalyst into the most feared bank in Silicon Valley as they\u2019re able to pitch to every company that they consistently get higher premiums on billion-dollar sell-side deals, capture the highest revenue multiples in tech M&A, and dominate market share on the biggest transactions by a significant margin.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=aL9YzkZ2lt0", "start_time": "0:00", "end_time": "0:07", "video_title": "Aruba Atmosphere 2015 Roundtable: HP Aruba Acquisition - What Does The Future Hold?", "channel": "20VC with Harry Stebbings", "description": "the aruba atmosphere delegates discuss the impact of the announcement of hp acquiring aruba networks and how the two ...", "match_reasoning": "Video support: the aruba atmosphere delegates discuss the impact of the announcement of hp acquiring aruba networks and how the two ...", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 66, "line_text": "So after looking back at all of this, what is the secret sauce?", "assets": [{"type": "image", "pic_number": 96, "description": "Backup for broll line 67: competitive advantage strategy", "entity_name": "competitive advantage strategy", "match_reasoning": "Visually appropriate for line 96", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 67, "line_text": "What is that actually makes Qatalyst so dominant?", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=ex3wCwZl2kg", "start_time": "0:00", "end_time": "0:07", "description": "cisco acquires appdynamics for $3.7 billion, facebook launches a snapchat story clone in its app in ireland, amazon owns more ...", "match_reasoning": "Strategic B-roll placement to avoid consecutive stills", "relevance_score": 8, "with_audio": false, "video_title": "AppDynamics Acquired for $3.7 Billion | Crunch Report", "channel": "TechCrunch", "era_appropriate": true, "source_type": "interview", "transcript_excerpt": "cisco acquires appdynamics for $3.7 billion, facebook launches a snapchat story clone in its app in "}], "has_gap": false, "custom_visual_description": null}, {"line_number": 68, "line_text": "SECTION 5: The Secret Sauce\nAfter speaking with 2 Qatalyst bankers, I\u2019ve learned that the firm\u2019s dominance boils down to three main reasons\nFirst is the fact that they focus on one thing - tech sell-side M&A and as Bruce Lee said - I do not fear the man who has practiced 10,000 kicks one, but I fear the man who has practiced one kick 10,000 times\nEvery big bank is trying to win IPO mandates, serve corporate buyers, manage lending relationships, and advising sellers\n[George Boutros interview b-roll - \"The big banks are trying to serve too many stakeholders at once.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=foDmbiR2kH8", "start_time": "3:30", "end_time": "3:37", "video_title": "Frank Quattrone: Lessons from 650 M&A Deals Worth Over $1TRN & Taking Amazon and Cisco Public| E1121", "channel": "20VC with Harry Stebbings", "description": "Discussion of Stanford's impact on tech career path", "match_reasoning": "Visual support for line 68", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 69, "line_text": "When the sell-side advisor and the buy-side advisor are both the same bank, that's not advisory.", "assets": [{"type": "image", "pic_number": 43, "description": "Backup for broll line 7: boutique investment bank", "entity_name": "boutique investment bank", "match_reasoning": "Visually appropriate for line 43", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 70, "line_text": "That's conflict.\"]\nWhile banks are practicing 10,000 different kicks, Qatalyst extracts the highest possible price from the buyer and has done so 10,000 times, with one spokesperson even saying \"Our advice is never clouded by the fear that if we push for the highest price we might offend the buyer\"\nSo when the top tech companies want to sell, they know Qatalyst will get them the best price\nSecond is the network built over decades that has compounded over time with Quattrone and Boutrous at the helm\nEvery time Qatalyst closes a deal, they learn something no one else knows - how Microsoft negotiates under pressure, what Google\u2019s internal approval process looks like, or where Amazon\u2019s ceiling is\nQuattrone in particular has seen it all - from helping Apple buy Next to ringing in the dotcom era to dominating software sell-side M&A when you\u2019re a client, you know you\u2019re getting insight you can\u2019t get anywhere else\nLastly, there\u2019s  the senior attention that scales down, not up\nAt a bulge bracket, deal size determines who shows up.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=foDmbiR2kH8", "start_time": "36:01", "end_time": "36:08", "video_title": "Frank Quattrone: Lessons from 650 M&A Deals Worth Over $1TRN & Taking Amazon and Cisco Public| E1121", "channel": "20VC with Harry Stebbings", "description": "Frank discussing what goes wrong in deals", "match_reasoning": "Visual support for line 70", "relevance_score": 7, "era_appropriate": true, "with_audio": false, "source_type": "interview"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 71, "line_text": "A $2 billion transaction may get a senior MD while a $20 billion transaction gets a vice chairman\nAt Qatalyst, the model inverts: CEO George Boutros is personally in every deal above $1 billion, screen-sharing presentations on client calls, in the numbers himself, and giving first-week analysts direct feedback.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=wCyMWjasfRI", "start_time": "0:00", "end_time": "0:07", "video_title": "Twilio hired Qatalyst to advise on defense against activist investor group", "channel": "SAD CAT SAD STORIES", "description": "cloud software developer twilio has hired qatalyst partners, the investment bank founded by frank quattrone, to advise on its ...", "match_reasoning": "Strategic placement: Frank recounting pivotal meeting with Steve Jobs", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview", "transcript_excerpt": "cloud software developer twilio has hired qatalyst partners, the investment bank founded by frank qu"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 72, "line_text": "When the person who closes the deal is the same person who ran the last three deals for the same buyer, information doesn't get lost in translation.", "assets": [{"type": "image", "pic_number": 88, "description": "Backup for broll line 49: boardroom client meeting", "entity_name": "boardroom client meeting", "match_reasoning": "Visually appropriate for line 88", "relevance_score": 8}], "has_gap": false, "custom_visual_description": null}, {"line_number": 73, "line_text": "These 3 factors are what has helped Qatalyst rise to the top.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=pbwdu2oUlto", "start_time": "0:00", "end_time": "0:07", "video_title": "Cage Match: Dell vs HP over 3PAR at #VMworld 2010", "channel": "Mark Rizzn Hopkins", "description": "kristen nicole tries to track down who 3par prefers: dell or hp? plus: hardcore wrasslin' featuring the dell and hp social media ...", "match_reasoning": "Strategic placement: Frank discussing Netscape IPO and bubble formation", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "source_type": "interview", "transcript_excerpt": "kristen nicole tries to track down who 3par prefers: dell or hp? plus: hardcore wrasslin' featuring "}], "has_gap": false, "custom_visual_description": null}, {"line_number": 74, "line_text": "In 2023, Qatalyst announced $61 billion across 9 deals and in 2024, $95 billion across 14, leading to averages of $6.8 billion per deal while for context, Goldman\u2019s value per deal hovers around $3 billion despite having a much larger team and more resources", "assets": [{"type": "image", "pic_number": 5, "description": "Qatalyst Partners - Qatalyst Partners logo", "entity_name": "Qatalyst Partners", "match_reasoning": "Qatalyst Partners visual for: 'In 2023, Qatalyst announced $61 billion across 9 d...'"}], "has_gap": false, "custom_visual_description": null}, {"line_number": 75, "line_text": "OUTRO\nQatalyst proves that the biggest firm or doing the most doesn't always win.", "assets": [{"type": "broll", "url": "https://www.youtube.com/watch?v=yDjCIOzTx2Y", "start_time": "0:00", "end_time": "0:07", "video_title": "Cisco Pulls Trigger on $3.7B AppDynamics Buyout", "channel": "Bloomberg Technology", "description": "jan.25 -- pwc u.s. tech deals leader todson page and bloomberg's alex barinka discuss cisco's deal for appdynamics before ...", "match_reasoning": "Strategic placement: Core M&A methodology and execution", "relevance_score": 9, "era_appropriate": true, "with_audio": true, "so         const qualityReport = {"metrics": {"unique_broll_sources": 42, "unique_still_images": 14, "total_broll_placements": 59, "total_image_placements": 23, "broll_with_audio": 20, "custom_visuals_generated": 3, "lines_with_no_visual": 0, "coverage_percentage": 100.0, "avg_relevance_score": 8.2, "era_mismatches": 0}, "verdict": "PASS"};

        // Create a map of image assets for quick lookup
        const imageMap = {};
        imageAssets.forEach(img => {
            imageMap[img.filename] = img;
        });

        let currentFilter = 'all';
        let currentSearch = '';

        // Initialize the page
        function init() {
            renderCards();
            setupEventListeners();
        }

        function setupEventListeners() {
            document.getElementById('searchBox').addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                renderCards();
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    renderCards();
                });
            });
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            let visibleCount = 0;

            assignmentMap.forEach(line => {
                // Check if should be filtered
                if (!shouldIncludeLine(line)) {
                    return;
                }

                visibleCount++;
                const card = createLineCard(line);
                container.appendChild(card);
            });

            // Show no results message
            if (visibleCount === 0) {
                const noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.innerHTML = '<div class="no-results-icon">∅</div><div>No matching lines found</div>';
                container.appendChild(noResults);
            }

            document.getElementById('lineCount').textContent = visibleCount;
        }

        function shouldIncludeLine(line) {
            // Filter by type
            if (currentFilter !== 'all') {
                const hasType = line.assets.some(asset => {
                    if (currentFilter === 'broll') return asset.type === 'broll';
                    if (currentFilter === 'image') return asset.type === 'image';
                    if (currentFilter === 'audio') return asset.type === 'broll' && asset.with_audio;
                    if (currentFilter === 'custom') return line.custom_visual_description;
                    if (currentFilter === 'gap') return line.has_gap;
                    return true;
                });

                if (!hasType) return false;
            }

            // Filter by search
            if (currentSearch) {
                const textMatch = line.line_text.toLowerCase().includes(currentSearch);
                if (!textMatch) return false;
            }

            return true;
        }

        function createLineCard(line) {
            const card = document.createElement('div');
            card.className = 'line-card';

            // Determine if card has gap
            const hasGap = line.has_gap;
            if (hasGap) card.style.opacity = '0.8';

            const lineText = line.line_text.substring(0, 150) + (line.line_text.length > 150 ? '...' : '');

            let cardHTML = `
                <div class="line-header">
                    <div class="line-badge">${line.line_number}</div>
                    <div class="line-text">${escapeHtml(lineText)}</div>
                </div>
                <div class="asset-panels">
            `;

            if (line.has_gap) {
                cardHTML += `
                    <div class="asset-panel gap">
                        <span class="gap-badge">NO ASSET FOUND</span>
                    </div>
                `;
            } else {
                line.assets.forEach(asset => {
                    if (asset.type === 'broll') {
                        cardHTML += createBrollPanel(asset);
                    } else if (asset.type === 'image') {
                        cardHTML += createImagePanel(asset);
                    }
                });

                if (line.custom_visual_description) {
                    cardHTML += `
                        <div class="asset-panel custom">
                            <span class="asset-type-badge">Custom Visual</span>
                            <div class="broll-details">
                                <div class="detail-row">
                                    <div class="detail-label">Description</div>
                                    <div class="detail-value">${escapeHtml(line.custom_visual_description)}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            cardHTML += `
                </div>
            `;

            card.innerHTML = cardHTML;
            return card;
        }

        function createBrollPanel(asset) {
            const youtubeId = extractYoutubeId(asset.url);
            const youtubeLink = `https://www.youtube.com/watch?v=${youtubeId}&t=${timeToSeconds(asset.start_time)}s`;
            
            const relevance = Math.min(10, Math.max(0, asset.relevance_score || 8));
            const relevancePercent = (relevance / 10) * 100;

            let html = `
                <div class="asset-panel broll">
                    <span class="asset-type-badge">B-Roll</span>
            `;

            if (asset.with_audio) {
                html += '<span class="asset-type-badge">Audio</span>';
            }

            html += `
                    <div class="broll-details">
                        <div class="detail-row">
                            <div class="detail-label">Video</div>
                            <div class="detail-value">
                                <a href="${youtubeLink}" target="_blank" rel="noopener noreferrer">
                                    ${escapeHtml(asset.video_title.substring(0, 60))}
                                </a>
                            </div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Channel</div>
                            <div class="detail-value">${escapeHtml(asset.channel)}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Time</div>
                            <div class="detail-value">
                                <span class="timestamp">${asset.start_time}</span>
                                <span style="color: #64748b;">→</span>
                                <span class="timestamp">${asset.end_time}</span>
                            </div>

                        <div class="detail-row">

                            <div class="detail-value">

                                    <div class="relevance-bar-fill">
                                        <div class="relevance-bar-progress" style="width: ${relevancePercent}%"></div>
                                    </div>
                                    <div class="relevance-score">${asset.relevance_score}/10</div>
                                </div>
                            </div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Era</div>
                            <div class="detail-value">
                                <span class="era-badge">${asset.era_appropriate ? '✓ Appropriate' : '✗ Mismatch'}</span>
                                <span class="source-type-badge">${asset.source_type || 'Unknown'}</span>
                            </div>
                        </div>
                    </div>
            `;

            if (asset.transcript_excerpt) {
                html += `
                    <label class="transcript-label">What's Being Said</label>
                    <div class="transcript">"${escapeHtml(asset.transcript_excerpt)}"</div>
                `;
            }

            if (asset.match_reasoning) {
                html += `
                    <label class="transcript-label">Why This Fits</label>
                    <div class="transcript">${escapeHtml(asset.match_reasoning)}</div>
                `;
            }

            html += `
                </div>
            `;

            return html;
        }

        function createImagePanel(asset) {
            const imageData = imageMap[asset.filename];
            let html = `
                <div class="asset-panel image">
                    <span class="asset-type-badge">Image</span>
            `;

            // Add image preview
            const imagePath = `pictures/${asset.filename}`;
            html += `<img src="${imagePath}" alt="Image asset" class="image-preview" onerror="this.classList.add('missing'); this.innerHTML = 'Image not found';">`;

            html += `
                    <div class="broll-details">
                        <div class="detail-row">
                            <div class="detail-label">File</div>
                            <div class="detail-value">${escapeHtml(asset.filename)}</div>
                        </div>
            `;

            if (imageData) {
                html += `
                        <div class="detail-row">
                            <div class="detail-label">Type</div>
                            <div class="detail-value">${escapeHtml(imageData.type || 'Unknown')}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Entity</div>
                            <div class="detail-value">${escapeHtml(imageData.entity_name || 'N/A')}</div>
                        </div>
                `;

                if (imageData.source_url) {
                    html += `
                        <div class="detail-row">
                            <div class="detail-label">Source</div>
                            <div class="detail-value">
                                <a href="${imageData.source_url}" target="_blank" rel="noopener noreferrer">
                                    ${escapeHtml(imageData.source_domain || 'View source')}
                                </a>
                            </div>
                        </div>
                    `;
                }
            }

            html += `
                    </div>
            `;

            if (asset.match_reasoning) {
                html += `
                    <label class="transcript-label">Why This Fits</label>
                    <div class="transcript">${escapeHtml(asset.match_reasoning)}</div>
                `;
            }

            html += `
                </div>
            `;

            return html;
        }

        function extractYoutubeId(url) {
            const regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&
?#]+)/;
            const match = url.match(regex);
            return match ? match[1] : '';
        }

        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':').map(Number);
            if (parts.length === 2) {
                return parts[0] * 60 + parts[1];
            } else if (parts.length === 3) {
                return parts[0] * 3600 + parts[1] * 60 + parts[2];
            }
            return 0;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', init);
    </script>
